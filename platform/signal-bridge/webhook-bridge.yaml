# alertmanager-webhook-signal: receives Alertmanager webhooks, forwards to Signal.
#
# Config is split: template + server settings in a ConfigMap (plaintext in git),
# sensitive signal config (phone, group ID) in a SealedSecret. An init container
# merges them into a single config.yaml at startup.
#
# To update secrets:
#   kubectl create secret generic webhook-signal-secrets -n monitoring \
#     --from-file=signal.yaml=signal.yaml \
#     --dry-run=client -o yaml \
#     | kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system -o yaml \
#     > platform/signal-bridge/sealed-webhook-secrets.yaml
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-webhook-signal
  labels:
    app: alertmanager-webhook-signal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-webhook-signal
  template:
    metadata:
      labels:
        app: alertmanager-webhook-signal
    spec:
      initContainers:
        - name: merge-config
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - cat /template/server.yaml /secrets/signal.yaml > /config/config.yaml
          volumeMounts:
            - name: template
              mountPath: /template
              readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: config
              mountPath: /config
      containers:
        - name: webhook
          image: schlauerlauer/alertmanager-webhook-signal:1.1.1
          command: ["./app"]
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
          ports:
            - name: http
              containerPort: 10000
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: template
          configMap:
            name: webhook-signal-template
        - name: secrets
          secret:
            secretName: webhook-signal-secrets
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-webhook-signal
spec:
  selector:
    app: alertmanager-webhook-signal
  ports:
    - name: http
      port: 10000
      targetPort: http
