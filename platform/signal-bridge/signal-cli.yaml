# signal-cli-rest-api: containerized Signal client with REST API.
#
# Registration credentials are stored as a SealedSecret and restored to the PVC
# by an init container on first boot. No manual registration needed.
#
# To update credentials after a re-registration:
#   kubectl exec -n monitoring deploy/signal-cli -- \
#     tar czf - -C /home/.local/share/signal-cli data/ > /tmp/signal-cli-data.tar.gz
#   kubectl create secret generic signal-cli-credentials -n monitoring \
#     --from-file=data.tar.gz=/tmp/signal-cli-data.tar.gz \
#     --dry-run=client -o yaml \
#     | kubeseal --controller-name=sealed-secrets --controller-namespace=kube-system -o yaml \
#     > platform/signal-bridge/sealed-signal-credentials.yaml
#
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: signal-cli-config
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli
  labels:
    app: signal-cli
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: signal-cli
  template:
    metadata:
      labels:
        app: signal-cli
    spec:
      initContainers:
        - name: restore-credentials
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              if [ -f /data/data/accounts.json ]; then
                echo "Credentials already present, skipping restore"
              else
                echo "Restoring credentials from sealed secret"
                cd /data && tar xzf /credentials/data.tar.gz
              fi
          volumeMounts:
            - name: config
              mountPath: /data
            - name: credentials
              mountPath: /credentials
              readOnly: true
      containers:
        - name: signal-cli
          image: bbernhard/signal-cli-rest-api:0.100
          env:
            - name: MODE
              value: json-rpc
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /home/.local/share/signal-cli
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: signal-cli-config
        - name: credentials
          secret:
            secretName: signal-cli-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: signal-cli
spec:
  selector:
    app: signal-cli
  ports:
    - name: http
      port: 8080
      targetPort: http
