# signal-cli-rest-api: containerized Signal client with REST API.
#
# First-time setup (one-time, interactive):
#   kubectl exec -it -n monitoring deploy/signal-cli -- signal-cli -a +1XXXXXXXXXX register
#   kubectl exec -it -n monitoring deploy/signal-cli -- signal-cli -a +1XXXXXXXXXX verify <code>
#
# Or link to existing device:
#   kubectl exec -it -n monitoring deploy/signal-cli -- signal-cli link -n "zaino-alerts"
#   (scan QR code from Signal app)
#
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: signal-cli-config
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli
  labels:
    app: signal-cli
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: signal-cli
  template:
    metadata:
      labels:
        app: signal-cli
    spec:
      containers:
        - name: signal-cli
          image: bbernhard/signal-cli-rest-api:0.97
          env:
            - name: MODE
              value: json-rpc
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /home/.local/share/signal-cli
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: signal-cli-config
---
apiVersion: v1
kind: Service
metadata:
  name: signal-cli
spec:
  selector:
    app: signal-cli
  ports:
    - name: http
      port: 8080
      targetPort: http
