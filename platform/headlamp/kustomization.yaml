apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: headlamp

helmCharts:
  - name: headlamp
    repo: https://kubernetes-sigs.github.io/headlamp/
    version: 0.43.0
    releaseName: headlamp
    namespace: headlamp
    valuesFile: values.yaml

patches:
  - target:
      kind: Service
      name: headlamp
    patch: |
      - op: add
        path: /metadata/annotations/tailscale.com~1expose
        value: "true"
      - op: add
        path: /metadata/annotations/tailscale.com~1hostname
        value: "headlamp"
