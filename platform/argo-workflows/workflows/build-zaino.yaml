# Build Zaino Image
# Builds zainod from a git ref using BuildKit (rootless) and pushes to a registry.
# BuildKit natively supports Dockerfile --mount=type=cache directives,
# and persists all cache state (cargo registry, target/, layers) on a PVC.
#
# Prerequisites:
#   - Docker registry secret 'docker-registry-creds' in argo namespace:
#     kubectl create secret docker-registry docker-registry-creds -n argo \
#       --docker-server=https://index.docker.io/v1/ \
#       --docker-username=<user> --docker-password=<token>
#   - PVC 'buildkit-cache' in argo namespace (managed via buildkit-cache-pvc.yaml)
#
# Usage:
#   argo submit --from workflowtemplate/build-zaino -n argo \
#     -p ref=my-feature-branch
#
#   argo submit --from workflowtemplate/build-zaino -n argo \
#     -p ref=dev -p tag=latest-dev
#
# Composable — call from other workflows via templateRef:
#   - name: build
#     templateRef:
#       name: build-zaino
#       template: build
#     arguments:
#       parameters:
#         - name: ref
#           value: "{{workflow.parameters.zaino-ref}}"
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-zaino
  namespace: argo
spec:
  entrypoint: build
  serviceAccountName: snapshot-workflow
  arguments:
    parameters:
      - name: ref
        value: dev
      - name: no-tls
        value: "true"
      - name: registry
        value: zingodevops/zaino
      - name: tag
        value: ""

  templates:
    - name: build
      inputs:
        parameters:
          - name: ref
            default: dev
          - name: no-tls
            default: "true"
          - name: registry
            default: zingodevops/zaino
          - name: tag
            default: ""
      steps:
        - - name: resolve-tag
            template: resolve-tag
            arguments:
              parameters:
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: tag
                  value: "{{inputs.parameters.tag}}"
        - - name: build-image
            template: buildkit
            arguments:
              parameters:
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: no-tls
                  value: "{{inputs.parameters.no-tls}}"
                - name: destination
                  value: "{{inputs.parameters.registry}}:{{steps.resolve-tag.outputs.parameters.tag}}"
      outputs:
        parameters:
          - name: image
            valueFrom:
              parameter: "{{steps.resolve-tag.outputs.parameters.image}}"

    - name: resolve-tag
      inputs:
        parameters:
          - name: ref
          - name: registry
          - name: tag
      container:
        image: busybox
        command: [sh, -c]
        args:
          - |
            TAG="{{inputs.parameters.tag}}"
            if [ -z "$TAG" ]; then
              TAG=$(echo "{{inputs.parameters.ref}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            fi
            IMAGE="{{inputs.parameters.registry}}:${TAG}"
            echo "Resolved tag: $TAG"
            echo "Resolved image: $IMAGE"
            echo -n "$TAG" > /tmp/tag
            echo -n "$IMAGE" > /tmp/image
      outputs:
        parameters:
          - name: tag
            valueFrom:
              path: /tmp/tag
          - name: image
            valueFrom:
              path: /tmp/image

    - name: buildkit
      inputs:
        parameters:
          - name: ref
          - name: no-tls
            default: "true"
          - name: destination
      container:
        image: moby/buildkit:v0.21.1-rootless
        env:
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
        command:
          - buildctl-daemonless.sh
        args:
          - build
          - --frontend
          - gateway.v0
          - --opt
          - source=docker/dockerfile
          - --opt
          - context=https://github.com/zingolabs/zaino.git#refs/heads/{{inputs.parameters.ref}}
          - --opt
          - build-arg:NO_TLS={{inputs.parameters.no-tls}}
          - --output
          - type=image,name={{inputs.parameters.destination}},push=true
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: Unconfined
          appArmorProfile:
            type: Unconfined
        volumeMounts:
          - name: docker-config
            mountPath: /home/user/.docker
            readOnly: true
          - name: buildkit-cache
            mountPath: /home/user/.local/share/buildkit
      volumes:
        - name: docker-config
          secret:
            secretName: docker-registry-creds
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: buildkit-cache
          persistentVolumeClaim:
            claimName: buildkit-cache
