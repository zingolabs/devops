# Build Zaino Image
# Builds zainod from a git ref using Kaniko and pushes to a registry
#
# Prerequisites:
#   - Docker registry secret 'docker-registry-creds' in argo namespace:
#     kubectl create secret docker-registry docker-registry-creds -n argo \
#       --docker-server=https://index.docker.io/v1/ \
#       --docker-username=<user> --docker-password=<token>
#
# Usage:
#   argo submit --from workflowtemplate/build-zaino -n argo \
#     -p ref=my-feature-branch
#
#   argo submit --from workflowtemplate/build-zaino -n argo \
#     -p ref=dev -p tag=latest-dev
#
# Composable — call from other workflows via templateRef:
#   - name: build
#     templateRef:
#       name: build-zaino
#       template: kaniko
#     arguments:
#       parameters:
#         - name: ref
#           value: "{{workflow.parameters.zaino-ref}}"
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-zaino
  namespace: argo
spec:
  entrypoint: build
  serviceAccountName: snapshot-workflow
  arguments:
    parameters:
      - name: ref
        value: dev
      - name: no-tls
        value: "true"
      - name: registry
        value: zingodevops/zaino
      - name: tag
        value: ""

  templates:
    - name: build
      steps:
        - - name: resolve-tag
            template: resolve-tag
        - - name: build-image
            template: kaniko
            arguments:
              parameters:
                - name: ref
                  value: "{{workflow.parameters.ref}}"
                - name: no-tls
                  value: "{{workflow.parameters.no-tls}}"
                - name: destination
                  value: "{{workflow.parameters.registry}}:{{steps.resolve-tag.outputs.parameters.tag}}"
      outputs:
        parameters:
          - name: image
            valueFrom:
              parameter: "{{steps.resolve-tag.outputs.parameters.image}}"

    - name: resolve-tag
      container:
        image: busybox
        command: [sh, -c]
        args:
          - |
            TAG="{{workflow.parameters.tag}}"
            if [ -z "$TAG" ]; then
              TAG=$(echo "{{workflow.parameters.ref}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            fi
            IMAGE="{{workflow.parameters.registry}}:${TAG}"
            echo "Resolved: $IMAGE"
            echo -n "$IMAGE" > /tmp/image
      outputs:
        parameters:
          - name: tag
            valueFrom:
              path: /tmp/image
          - name: image
            valueFrom:
              path: /tmp/image

    - name: kaniko
      inputs:
        parameters:
          - name: ref
          - name: no-tls
            default: "true"
          - name: destination
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - --context=git://github.com/zingolabs/zaino.git#refs/heads/{{inputs.parameters.ref}}
          - --dockerfile=Dockerfile
          - --destination={{inputs.parameters.destination}}
          - --build-arg=NO_TLS={{inputs.parameters.no-tls}}
          - --cache=true
          - --cache-repo=zingodevops/zaino:kaniko-cache
          - --snapshot-mode=redo
          - --use-new-run
        volumeMounts:
          - name: docker-config
            mountPath: /kaniko/.docker
      volumes:
        - name: docker-config
          secret:
            secretName: docker-registry-creds
            items:
              - key: .dockerconfigjson
                path: config.json
