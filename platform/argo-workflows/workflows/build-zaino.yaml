# Build Zaino Image
# Builds zainod from a git ref using BuildKit (rootless) and pushes to a registry.
# BuildKit natively supports Dockerfile --mount=type=cache directives,
# and persists all cache state (cargo registry, target/, layers) on a PVC.
#
# Prerequisites:
#   - Docker registry secret 'docker-registry-creds' in argo namespace:
#     kubectl create secret docker-registry docker-registry-creds -n argo \
#       --docker-server=https://index.docker.io/v1/ \
#       --docker-username=<user> --docker-password=<token>
#   - PVC 'buildkit-cache' in argo namespace (managed via buildkit-cache-pvc.yaml)
#
# Usage:
#   argo submit --from workflowtemplate/build-zaino -n argo \
#     -p ref=my-feature-branch
#
#   argo submit --from workflowtemplate/build-zaino -n argo \
#     -p ref=dev -p tag=latest-dev
#
# Composable — call from other workflows via templateRef:
#   - name: build
#     templateRef:
#       name: build-zaino
#       template: build
#     arguments:
#       parameters:
#         - name: ref
#           value: "{{workflow.parameters.zaino-ref}}"
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-zaino
  namespace: argo
spec:
  entrypoint: build
  serviceAccountName: snapshot-workflow
  arguments:
    parameters:
      - name: ref
        value: dev
      - name: cargo-features
        value: "no_tls_with_prometheus"
      - name: registry
        value: zingodevops/zaino
      - name: tag
        value: ""
      - name: rust-version
        value: "1.95.0"
      - name: force-build
        value: "false"

  templates:
    - name: build
      inputs:
        parameters:
          - name: ref
            default: dev
          - name: cargo-features
            default: "no_tls_with_prometheus"
          - name: registry
            default: zingodevops/zaino
          - name: tag
            default: ""
          - name: rust-version
            default: "1.95.0"
          - name: force-build
            default: "false"
      steps:
        - - name: resolve-tag
            template: resolve-tag
            arguments:
              parameters:
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: registry
                  value: "{{inputs.parameters.registry}}"
                - name: tag
                  value: "{{inputs.parameters.tag}}"
                - name: cargo-features
                  value: "{{inputs.parameters.cargo-features}}"
        - - name: check-image
            template: check-image
            arguments:
              parameters:
                - name: image
                  value: "{{steps.resolve-tag.outputs.parameters.image}}"
                - name: force-build
                  value: "{{inputs.parameters.force-build}}"
        - - name: build-image
            template: buildkit
            when: "{{steps.check-image.outputs.parameters.exists}} == false"
            arguments:
              parameters:
                - name: ref
                  value: "{{inputs.parameters.ref}}"
                - name: cargo-features
                  value: "{{inputs.parameters.cargo-features}}"
                - name: rust-version
                  value: "{{inputs.parameters.rust-version}}"
                - name: destination
                  value: "{{inputs.parameters.registry}}:{{steps.resolve-tag.outputs.parameters.tag}}"
      outputs:
        parameters:
          - name: image
            valueFrom:
              parameter: "{{steps.resolve-tag.outputs.parameters.image}}"

    - name: resolve-tag
      inputs:
        parameters:
          - name: ref
          - name: registry
          - name: tag
          - name: cargo-features
            default: "no_tls_with_prometheus"
      container:
        image: busybox
        command: [sh, -c]
        args:
          - |
            TAG="{{inputs.parameters.tag}}"
            if [ -z "$TAG" ]; then
              TAG=$(echo "{{inputs.parameters.ref}}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            fi
            # Append feature suffix (e.g. no_tls_with_prometheus -> -no-tls-with-prometheus)
            FEATURES="{{inputs.parameters.cargo-features}}"
            if [ -n "$FEATURES" ]; then
              SUFFIX=$(echo "$FEATURES" | sed 's/_/-/g')
              TAG="${TAG}-${SUFFIX}"
            fi
            IMAGE="{{inputs.parameters.registry}}:${TAG}"
            echo "Resolved tag: $TAG"
            echo "Resolved image: $IMAGE"
            echo -n "$TAG" > /tmp/tag
            echo -n "$IMAGE" > /tmp/image
      outputs:
        parameters:
          - name: tag
            valueFrom:
              path: /tmp/tag
          - name: image
            valueFrom:
              path: /tmp/image

    - name: check-image
      inputs:
        parameters:
          - name: image
          - name: force-build
            default: "false"
      container:
        image: busybox
        command: [sh, -c]
        args:
          - |
            if [ "{{inputs.parameters.force-build}}" = "true" ]; then
              echo "Force build requested — skipping cache check"
              echo -n "false" > /tmp/exists
            else
              REPO=$(echo "{{inputs.parameters.image}}" | cut -d: -f1)
              TAG=$(echo "{{inputs.parameters.image}}" | cut -d: -f2)
              if wget -q --spider "https://hub.docker.com/v2/repositories/${REPO}/tags/${TAG}" 2>/dev/null; then
                echo "Image {{inputs.parameters.image}} found in registry — skipping build"
                echo -n "true" > /tmp/exists
              else
                echo "Image {{inputs.parameters.image}} not in registry — build required"
                echo -n "false" > /tmp/exists
              fi
            fi
      outputs:
        parameters:
          - name: exists
            valueFrom:
              path: /tmp/exists

    - name: buildkit
      inputs:
        parameters:
          - name: ref
          - name: cargo-features
            default: "no_tls_with_prometheus"
          - name: rust-version
            default: "1.95.0"
          - name: destination
      container:
        image: moby/buildkit:v0.21.1-rootless
        env:
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
        command:
          - buildctl-daemonless.sh
        args:
          - build
          - --frontend
          - gateway.v0
          - --opt
          - source=docker/dockerfile
          - --opt
          - context=https://github.com/zingolabs/zaino.git#{{inputs.parameters.ref}}
          - --opt
          - build-arg:RUST_VERSION={{inputs.parameters.rust-version}}
          - --opt
          - build-arg:CARGO_FEATURES={{inputs.parameters.cargo-features}}
          - --opt
          - build-arg:NO_TLS=true
          - --output
          - type=image,name={{inputs.parameters.destination}},push=true
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: Unconfined
          appArmorProfile:
            type: Unconfined
        volumeMounts:
          - name: docker-config
            mountPath: /home/user/.docker
            readOnly: true
          - name: buildkit-cache
            mountPath: /home/user/.local/share/buildkit
      volumes:
        - name: docker-config
          secret:
            secretName: docker-registry-creds
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: buildkit-cache
          persistentVolumeClaim:
            claimName: buildkit-cache
