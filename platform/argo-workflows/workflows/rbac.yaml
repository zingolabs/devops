# RBAC for Argo Workflows to manage snapshots and ephemeral deploys
#
# Grants workflows permission to:
# - Create/watch Kanister ActionSets
# - Label VolumeSnapshots
# - Report workflow task results (Argo internal)
# - Create/manage namespaces for ephemeral deploys
# - Deploy zcash-stack via helm (statefulsets, services, etc.)
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapshot-workflow
  namespace: argo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: snapshot-workflow
rules:
  # Kanister ActionSets
  - apiGroups: ["cr.kanister.io"]
    resources: ["actionsets"]
    verbs: ["create", "get", "watch", "list"]
  # VolumeSnapshots (for labeling)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "patch", "update"]
  # Argo Workflows task results (for output parameters)
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
  # Namespaces for ephemeral deploys
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "patch", "delete"]
  # Helm deploy resources
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "persistentvolumeclaims"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: snapshot-workflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: snapshot-workflow
subjects:
  - kind: ServiceAccount
    name: snapshot-workflow
    namespace: argo

