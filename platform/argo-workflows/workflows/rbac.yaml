# RBAC for Argo Workflows to manage snapshots
#
# Grants workflows permission to:
# - Create/watch Kanister ActionSets
# - Label VolumeSnapshots
# - Report workflow task results (Argo internal)
#
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapshot-workflow
  namespace: argo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: snapshot-workflow
rules:
  # Kanister ActionSets
  - apiGroups: ["cr.kanister.io"]
    resources: ["actionsets"]
    verbs: ["create", "get", "watch", "list"]
  # VolumeSnapshots (for labeling)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "patch", "update"]
  # Argo Workflows task results (for output parameters)
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]

---
# Bind to zcash namespace for VolumeSnapshots
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: snapshot-workflow
  namespace: zcash
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: snapshot-workflow
subjects:
  - kind: ServiceAccount
    name: snapshot-workflow
    namespace: argo

---
# Bind to kanister namespace for ActionSets
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: snapshot-workflow
  namespace: kanister
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: snapshot-workflow
subjects:
  - kind: ServiceAccount
    name: snapshot-workflow
    namespace: argo

---
# Bind to argo namespace for workflow task results
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: snapshot-workflow
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: snapshot-workflow
subjects:
  - kind: ServiceAccount
    name: snapshot-workflow
    namespace: argo
