# Cleanup Ephemeral Deployment
# Deletes namespace and all resources within, including cluster-scoped
# VolumeSnapshotContents that reference the namespace.
#
# Usage:
#   argo submit --from workflowtemplate/cleanup-ephemeral \
#     -p namespace=ephemeral-test
#
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cleanup-ephemeral
  namespace: argo
spec:
  entrypoint: cleanup
  serviceAccountName: snapshot-workflow
  arguments:
    parameters:
      - name: namespace
        value: ephemeral-test

  templates:
    - name: cleanup
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
          - |
            set -e
            NS="{{workflow.parameters.namespace}}"

            # Safety check - only delete namespaces labeled as ephemeral
            LABEL=$(kubectl get namespace "$NS" -o jsonpath='{.metadata.labels.zcash-stack/ephemeral}' 2>/dev/null || echo "")

            if [ "$LABEL" != "true" ]; then
              echo "ERROR: Namespace $NS is not labeled as ephemeral!"
              echo "Refusing to delete for safety."
              exit 1
            fi

            # Collect cluster-scoped VSC names before deleting the namespace,
            # because the namespace-scoped VolumeSnapshots they reference will
            # be cascade-deleted along with it.
            echo "Collecting VolumeSnapshotContents referencing $NS..."
            VSCS=$(kubectl get volumesnapshotcontent -o jsonpath='{range .items[?(@.spec.volumeSnapshotRef.namespace=="'$NS'")]}{.metadata.name}{"\n"}{end}')

            # Delete namespace first — this cascades to all namespace-scoped
            # resources (VolumeSnapshots, PVCs, pods, etc), allowing their
            # finalizers to resolve while the backing VSC still exists.
            echo "Deleting ephemeral namespace: $NS"
            kubectl delete namespace "$NS" --wait=true

            # Now clean up the orphaned cluster-scoped VSCs.
            # Safe because deletionPolicy: Retain means this only removes
            # the Kubernetes object, not the underlying LVM snapshot.
            echo "$VSCS" | while read -r vsc; do
              [ -z "$vsc" ] && continue
              echo "  Deleting VolumeSnapshotContent: $vsc"
              kubectl delete volumesnapshotcontent "$vsc" --ignore-not-found
            done
            echo "Cleanup complete."
