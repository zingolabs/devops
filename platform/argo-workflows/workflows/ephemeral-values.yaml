# ConfigMap containing values for ephemeral deployments
apiVersion: v1
kind: ConfigMap
metadata:
  name: ephemeral-values
  namespace: argo
data:
  ephemeral-testnet.yaml: |
    ingress:
      enabled: false

    zebra:
      enabled: true
      name: zebra
      testnet: true
      replicas: 1
      image:
        tag: "4.0.0"
        hash: ""
      storageClassName: topolvm-thin
      volumes:
        data:
          size: 20Gi
          dataSource:
            kind: VolumeSnapshot
            apiGroup: snapshot.storage.k8s.io
            # name is set via --set at deploy time
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 4Gi

    zaino:
      enabled: true
      name: zaino
      replicas: 1
      rpcService: zebra
      image:
        repository: zingodevops/zaino
        tag: 0.2.0-rc.4-no-tls
        hash: ""
      storageClassName: topolvm-thin
      volumes:
        data:
          size: 150Gi
          dataSource:
            kind: VolumeSnapshot
            apiGroup: snapshot.storage.k8s.io
            # name is set via --set at deploy time
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 8Gi

    lightwalletd:
      enabled: false

    zcashd:
      enabled: false
