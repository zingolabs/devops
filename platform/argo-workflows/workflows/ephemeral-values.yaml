# ConfigMap containing values for ephemeral deployments
apiVersion: v1
kind: ConfigMap
metadata:
  name: ephemeral-values
  namespace: argo
data:
  tryout-mainnet.yaml: |
    # Zaino-only tryout instance, uses golden-mainnet zebra
    ingress:
      enabled: false

    zebra:
      enabled: false

    zaino:
      enabled: true
      name: zaino
      replicas: 1
      rpcService: zebra.golden-mainnet.svc
      image:
        repository: zingodevops/zaino
        tag: 0.2.0-rc.6-no-tls
        hash: ""
      logging:
        format: json
        color: "false"
        level: "zaino=trace,zainod=trace,info"
      storageClassName: topolvm-thin
      volumes:
        data:
          size: 100Gi
          dataSource:
            kind: VolumeSnapshot
            apiGroup: snapshot.storage.k8s.io
            # name is set via --set at deploy time
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        memory: 16Gi

    lightwalletd:
      enabled: false

    zcashd:
      enabled: false

  ephemeral-mainnet.yaml: |
    ingress:
      enabled: false

    zebra:
      enabled: true
      name: zebra
      testnet: false
      replicas: 1
      image:
        tag: "5.2.0"
        hash: "883cc4c341524edab34eec4a282679ce8b3603e3f337980f719b2728fd960616"
      storageClassName: topolvm-thin
      volumes:
        data:
          size: 350Gi
          dataSource:
            kind: VolumeSnapshot
            apiGroup: snapshot.storage.k8s.io
            # name is set via --set at deploy time
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        cpu: 2
        memory: 24Gi

    zaino:
      enabled: true
      name: zaino
      replicas: 1
      rpcService: zebra
      service:
        port: 8137
        metricsPort: 9998
      image:
        repository: zingodevops/zaino
        tag: 0.3.1-no-tls
        hash: ""
      extraEnv:
        ZAINO_METRICS_ENDPOINT: "0.0.0.0:9998"
        OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.monitoring.svc:4317"
      config:
        dbSize: 96
      logging:
        format: json
        color: "false"
      storageClassName: topolvm-thin
      volumes:
        data:
          size: 100Gi
          dataSource:
            kind: VolumeSnapshot
            apiGroup: snapshot.storage.k8s.io
            # name is set via --set at deploy time or nulled for fresh
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        cpu: 2
        memory: 16Gi

    lightwalletd:
      enabled: false

    zcashd:
      enabled: false

  ephemeral-testnet.yaml: |
    ingress:
      enabled: false

    zebra:
      enabled: true
      name: zebra
      testnet: true
      replicas: 1
      image:
        tag: "4.4.0"
      storageClassName: topolvm-thin
      volumes:
        data:
          size: 20Gi
          dataSource:
            kind: VolumeSnapshot
            apiGroup: snapshot.storage.k8s.io
            # name is set via --set at deploy time
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 4Gi

    zaino:
      enabled: true
      name: zaino
      replicas: 1
      rpcService: zebra
      image:
        repository: zingodevops/zaino
        tag: 0.2.0-rc.4-no-tls
        hash: ""
      storageClassName: topolvm-thin
      volumes:
        data:
          size: 100Gi
          dataSource:
            kind: VolumeSnapshot
            apiGroup: snapshot.storage.k8s.io
            # name is set via --set at deploy time
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 8Gi

    lightwalletd:
      enabled: false

    zcashd:
      enabled: false
