apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: argo-workflows
    repo: https://argoproj.github.io/argo-helm
    version: 0.45.0
    releaseName: argo-workflows
    namespace: argo
    valuesFile: values.yaml

patches:
  - target:
      kind: Service
      name: argo-workflows-server
    patch: |
      - op: replace
        path: /spec/ports/0/port
        value: 80
