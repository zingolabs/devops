# RBAC for Kanister to manage workloads and snapshots
#
# Following Kanister security best practices (GHSA-h27c-6xm3-mcqp):
# - ClusterRole defines permissions once
# - RoleBinding grants access per-namespace (principle of least privilege)
#
# To grant Kanister access to a new namespace, add a RoleBinding below.
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kanister-workload-manager
rules:
  # Scale workloads (ScaleWorkload function)
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "statefulsets/scale", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Manage snapshots (CreateCSISnapshot function)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots", "volumesnapshotcontents"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Read PVCs (snapshot source)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # Read pods (for KubeExec if needed)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
# Grant Kanister access to golden namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kanister-workload-manager
  namespace: golden-mainnet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kanister-workload-manager
subjects:
  - kind: ServiceAccount
    name: kanister-kanister-operator
    namespace: kanister
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kanister-workload-manager
  namespace: golden-testnet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kanister-workload-manager
subjects:
  - kind: ServiceAccount
    name: kanister-kanister-operator
    namespace: kanister
