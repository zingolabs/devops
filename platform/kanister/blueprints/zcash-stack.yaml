# Kanister Blueprint for zcash-stack (Zebra + Zaino) snapshots
# Creates coordinated VolumeSnapshots with minimal downtime
#
# Target: Zebra StatefulSet
# Options (passed via ActionSet):
#   - zainoPvc: PVC to snapshot for zaino
#   - zebraPvc: PVC to snapshot for zebra
#   - network: testnet/mainnet (for labeling)
#
# Note: Zaino is NOT scaled down. While zebra is down, zaino will error
# but won't be writing data, making the snapshot consistent.
# This avoids needing to know about all zainos depending on a zebra.
#
apiVersion: cr.kanister.io/v1alpha1
kind: Blueprint
metadata:
  name: zcash-stack
  namespace: kanister
  annotations:
    argocd.argoproj.io/sync-wave: "1"
actions:
  backup:
    outputArtifacts:
      zebraSnapshot:
        keyValue:
          name: "{{ .Phases.snapshotZebra.Output.name }}"
          namespace: "{{ .Object.metadata.namespace }}"
      zainoSnapshot:
        keyValue:
          name: "{{ .Phases.snapshotZaino.Output.name }}"
          namespace: "{{ .Object.metadata.namespace }}"
    phases:
    # Phase 1: Scale down Zebra
    - func: ScaleWorkload
      name: scaleDownZebra
      args:
        namespace: "{{ .Object.metadata.namespace }}"
        name: "{{ .Object.metadata.name }}"
        kind: StatefulSet
        replicas: 0
    # Phase 2: Create Zebra VolumeSnapshot
    - func: CreateCSISnapshot
      name: snapshotZebra
      args:
        namespace: "{{ .Object.metadata.namespace }}"
        pvc: "{{ .Options.zebraPvc }}"
        snapshotClass: topolvm-snapshot
        labels:
          app.kubernetes.io/component: zebra
          zcash-stack/network: "{{ .Options.network }}"
    # Phase 3: Create Zaino VolumeSnapshot (zaino is idle while zebra is down)
    - func: CreateCSISnapshot
      name: snapshotZaino
      args:
        namespace: "{{ .Object.metadata.namespace }}"
        pvc: "{{ .Options.zainoPvc }}"
        snapshotClass: topolvm-snapshot
        labels:
          app.kubernetes.io/component: zaino
          zcash-stack/network: "{{ .Options.network }}"
    # Phase 4: Scale Zebra back up (zaino recovers automatically)
    - func: ScaleWorkload
      name: scaleUpZebra
      args:
        namespace: "{{ .Object.metadata.namespace }}"
        name: "{{ .Object.metadata.name }}"
        kind: StatefulSet
        replicas: 1

  restore:
    inputArtifactNames:
    - zebraSnapshot
    - zainoSnapshot
    phases:
    - func: RestoreCSISnapshot
      name: restoreZebra
      args:
        namespace: "{{ .Object.metadata.namespace }}"
        name: "{{ .ArtifactsIn.zebraSnapshot.keyValue.name }}"
        pvc: "{{ .Options.restoreZebraPvc }}"
        storageClass: topolvm-thin
        restoreSize: "{{ .Options.zebraSize }}"
    - func: RestoreCSISnapshot
      name: restoreZaino
      args:
        namespace: "{{ .Object.metadata.namespace }}"
        name: "{{ .ArtifactsIn.zainoSnapshot.keyValue.name }}"
        pvc: "{{ .Options.restoreZainoPvc }}"
        storageClass: topolvm-thin
        restoreSize: "{{ .Options.zainoSize }}"

  delete:
    inputArtifactNames:
    - zebraSnapshot
    - zainoSnapshot
    phases:
    - func: DeleteCSISnapshot
      name: deleteZebraSnapshot
      args:
        namespace: "{{ .ArtifactsIn.zebraSnapshot.keyValue.namespace }}"
        name: "{{ .ArtifactsIn.zebraSnapshot.keyValue.name }}"
    - func: DeleteCSISnapshot
      name: deleteZainoSnapshot
      args:
        namespace: "{{ .ArtifactsIn.zainoSnapshot.keyValue.namespace }}"
        name: "{{ .ArtifactsIn.zainoSnapshot.keyValue.name }}"
