apiVersion: v1
kind: ConfigMap
metadata:
  name: zcash-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  zcash-logs.json: |
    {
      "uid": "zcash-logs",
      "title": "Zcash Stack Logs",
      "tags": ["zaino", "zebra", "zcash", "logs"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": { "label": "namespace", "stream": "{app=~\"zaino|zebra\"}", "type": 1 },
            "refresh": 2,
            "includeAll": false,
            "current": {},
            "sort": 1
          },
          {
            "name": "service",
            "label": "Service",
            "type": "custom",
            "query": "Zaino + Zebra : zaino|zebra, Zaino : zaino, Zebra : zebra",
            "current": { "text": "Zaino + Zebra", "value": "zaino|zebra" },
            "includeAll": false
          },
          {
            "name": "search",
            "label": "Search",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Log volume (lines/sec)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "unit": "logs",
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 50,
                "lineWidth": 1,
                "stacking": { "mode": "normal", "group": "A" }
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "zaino" },
                "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-blue" } } ]
              },
              {
                "matcher": { "id": "byName", "options": "zebra" },
                "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-orange" } } ]
              }
            ]
          },
          "options": { "legend": { "showLegend": true, "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (app) (count_over_time({namespace=\"$namespace\", app=~\"$service\"} |= \"$search\" [$__auto]))",
              "legendFormat": "{{app}}",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 2,
          "title": "Logs — $service @ $namespace",
          "type": "logs",
          "gridPos": { "h": 26, "w": 24, "x": 0, "y": 6 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending",
            "enableInfiniteScrolling": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=\"$namespace\", app=~\"$service\"} |= \"$search\"",
              "queryType": "range"
            }
          ]
        }
      ],
      "time": { "from": "now-1h", "to": "now" }
    }
