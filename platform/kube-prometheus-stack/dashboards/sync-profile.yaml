apiVersion: v1
kind: ConfigMap
metadata:
  name: sync-profile-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sync-profile.json: |
    {
      "uid": "sync-profile",
      "title": "Sync Profile",
      "tags": ["zaino", "zcash"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(zaino_chain_tip_height, namespace)",
            "refresh": 2,
            "includeAll": false,
            "current": {},
            "sort": 1
          }
        ]
      },
      "annotations": {
            "list": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "enable": true,
                "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\", container=\"zaino\"}[2m]) > 0",
                "name": "Zaino Restart",
                "iconColor": "red",
                "titleFormat": "Zaino restarted"
              }
            ]
          },
          "panels": [
        {
          "id": 1,
          "title": "Sync Speed vs Block Height",
          "description": "Blocks synced per minute as a function of chain height (15m smoothing)",
          "type": "xychart",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "datasource", "uid": "-- Mixed --" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "show": "points",
                "pointSize": { "fixed": 2 }
              },
              "color": { "mode": "fixed", "fixedColor": "semi-dark-green" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Height" },
                "properties": [
                  { "id": "unit", "value": "locale" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "upgrade" },
                "properties": [
                  { "id": "custom.show", "value": "points" },
                  { "id": "custom.pointSize", "value": { "fixed": 7 } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "sandblast" },
                "properties": [
                  { "id": "custom.show", "value": "points" },
                  { "id": "custom.pointSize", "value": { "fixed": 7 } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }
                ]
              }
            ]
          },
          "options": {
            "seriesMapping": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Height",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(zaino_sync_finalized_height{namespace=\"$namespace\"}[15m]) * 60",
              "legendFormat": "blocks/min",
              "refId": "B"
            },
            {
              "datasource": { "type": "grafana-testdata-datasource", "uid": "testdata" },
              "scenarioId": "csv_content",
              "csvContent": "height,upgrade\n347500,0\n419200,0\n653600,0\n903000,0\n1046400,0\n1687104,0\n2726400,0",
              "refId": "C"
            },
            {
              "datasource": { "type": "grafana-testdata-datasource", "uid": "testdata" },
              "scenarioId": "csv_content",
              "csvContent": "height,sandblast\n1700000,0\n2000000,0",
              "refId": "D"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "Time" },
              "filter": { "id": "byRefId", "options": "A|B" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true }
              }
            }
          ]
        },
        {
          "id": 2,
          "title": "Transaction Throughput vs Block Height",
          "description": "Transactions indexed per second as a function of chain height (15m smoothing)",
          "type": "xychart",
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "show": "points",
                "pointSize": { "fixed": 2 }
              },
              "color": { "mode": "fixed", "fixedColor": "semi-dark-yellow" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Height" },
                "properties": [
                  { "id": "unit", "value": "locale" }
                ]
              }
            ]
          },
          "options": {
            "seriesMapping": "auto"
          },
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Height",
              "refId": "A"
            },
            {
              "expr": "rate(zaino_sync_transactions_total{namespace=\"$namespace\"}[15m])",
              "legendFormat": "tx/s",
              "refId": "B"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "Time" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true }
              }
            }
          ]
        },
        {
          "id": 3,
          "title": "Shielded Throughput vs Block Height",
          "description": "Sapling outputs + Orchard actions per second as a function of chain height (15m smoothing)",
          "type": "xychart",
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "show": "points",
                "pointSize": { "fixed": 2 }
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Height" },
                "properties": [
                  { "id": "unit", "value": "locale" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Sapling/s" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-purple" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Orchard/s" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-blue" } }
                ]
              }
            ]
          },
          "options": {
            "seriesMapping": "auto"
          },
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Height",
              "refId": "A"
            },
            {
              "expr": "rate(zaino_sync_sapling_outputs_total{namespace=\"$namespace\"}[15m])",
              "legendFormat": "Sapling/s",
              "refId": "B"
            },
            {
              "expr": "rate(zaino_sync_orchard_actions_total{namespace=\"$namespace\"}[15m])",
              "legendFormat": "Orchard/s",
              "refId": "C"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "Time" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true }
              }
            }
          ]
        },
        {
          "id": 4,
          "title": "Block Build Latency vs Block Height",
          "description": "Time to fetch and build one indexed block as a function of chain height (log scale)",
          "type": "xychart",
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "show": "points",
                "pointSize": { "fixed": 2 }
              },
              "scaleDistribution": { "type": "log", "log": 10 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Height" },
                "properties": [
                  { "id": "unit", "value": "locale" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "p50" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "p99" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-red" } }
                ]
              }
            ]
          },
          "options": {
            "seriesMapping": "auto"
          },
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Height",
              "refId": "A"
            },
            {
              "expr": "zaino_sync_block_build_seconds{namespace=\"$namespace\", quantile=\"0.5\"}",
              "legendFormat": "p50",
              "refId": "B"
            },
            {
              "expr": "zaino_sync_block_build_seconds{namespace=\"$namespace\", quantile=\"0.99\"}",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "Time" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true }
              }
            }
          ]
        },
        {
          "id": 5,
          "title": "RPC Latency vs Block Height",
          "description": "Zebra RPC response time as a function of chain height being synced (log scale)",
          "type": "xychart",
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "show": "points",
                "pointSize": { "fixed": 2 }
              },
              "scaleDistribution": { "type": "log", "log": 10 }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Height" },
                "properties": [
                  { "id": "unit", "value": "locale" }
                ]
              }
            ]
          },
          "options": {
            "seriesMapping": "auto"
          },
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Height",
              "refId": "A"
            },
            {
              "expr": "rpc_request_duration_seconds{namespace=\"$namespace\", quantile=\"0.5\"}",
              "legendFormat": "p50 {{method}}",
              "refId": "B"
            },
            {
              "expr": "rpc_request_duration_seconds{namespace=\"$namespace\", quantile=\"0.99\"}",
              "legendFormat": "p99 {{method}}",
              "refId": "C"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "Time" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true }
              }
            }
          ]
        },
        {
          "id": 6,
          "title": "Block Build Latency (current)",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 36 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 4
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "quantile" },
                "properties": [
                  { "id": "custom.width", "value": 80 },
                  { "id": "unit", "value": "none" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "quantile", "desc": false }]
          },
          "targets": [
            {
              "expr": "zaino_sync_block_build_seconds{namespace=\"$namespace\"}",
              "legendFormat": "{{quantile}}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "component": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "managed_by": true,
                  "name": true,
                  "namespace": true,
                  "pod": true,
                  "service": true
                },
                "indexByName": {
                  "quantile": 0,
                  "Value": 1
                },
                "renameByName": {
                  "Value": "latency"
                }
              }
            }
          ]
        },
        {
          "id": 7,
          "title": "RPC Latency by Method (current)",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 36 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 4
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "method\\quantile" },
                "properties": [
                  { "id": "custom.width", "value": 160 },
                  { "id": "unit", "value": "none" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "method\\quantile", "desc": false }]
          },
          "targets": [
            {
              "expr": "rpc_request_duration_seconds{namespace=\"$namespace\"}",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "managed_by": true,
                  "name": true,
                  "namespace": true,
                  "pod": true,
                  "service": true
                }
              }
            },
            {
              "id": "groupingToMatrix",
              "options": {
                "columnField": "quantile",
                "rowField": "method",
                "valueField": "Value"
              }
            }
          ]
        }
      ],
      "time": { "from": "now-6h", "to": "now" }
    }
