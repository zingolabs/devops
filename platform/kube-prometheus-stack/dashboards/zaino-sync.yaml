apiVersion: v1
kind: ConfigMap
metadata:
  name: zaino-sync-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  zaino-sync.json: |
    {
      "uid": "zaino-sync",
      "title": "Zaino Sync",
      "tags": ["zaino", "zcash"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 4,
      "refresh": "10s",
      "links": [
        {
          "title": "Open logs view",
          "type": "link",
          "icon": "doc",
          "tooltip": "Full logs explorer for this namespace",
          "url": "/d/zcash-logs/zcash-stack-logs?var-namespace=${namespace}&${__url_time_range}",
          "targetBlank": true,
          "includeVars": false,
          "keepTime": true
        }
      ],
      "annotations": {
            "list": [
              {
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "enable": true,
                "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\", container=\"zaino\"}[2m]) > 0",
                "name": "Zaino Restart",
                "iconColor": "red",
                "titleFormat": "Zaino restarted"
              }
            ]
          },
          "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(zaino_chain_tip_height, namespace)",
            "refresh": 2,
            "includeAll": false,
            "current": {},
            "sort": 1
          },
          {
            "name": "logsearch",
            "label": "Log search",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Sync Progress",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 16, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": true
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Chain Tip" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-orange" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Finalized Height" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-green" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "DB Tip" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-blue" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Finalized Height"
            },
            {
              "expr": "zaino_db_tip_height{namespace=\"$namespace\"}",
              "legendFormat": "DB Tip"
            },
            {
              "expr": "zaino_chain_tip_height{namespace=\"$namespace\"}",
              "legendFormat": "Chain Tip"
            },
            {
              "expr": "zaino_sync_target_height{namespace=\"$namespace\"}",
              "legendFormat": "Target Height"
            }
          ]
        },
        {
          "id": 2,
          "title": "Sync Gap",
          "description": "Blocks behind: zaino's reported sync lag (zaino_sync_lag_blocks)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 1000 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "zaino_sync_lag_blocks{namespace=\"$namespace\"}",
              "legendFormat": "Blocks behind"
            }
          ]
        },
        {
          "id": 3,
          "title": "Sync Rate (blocks/min)",
          "type": "timeseries",
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 1,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": true
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Average" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [6, 6] } },
                  { "id": "custom.lineWidth", "value": 1 },
                  { "id": "custom.fillOpacity", "value": 0 },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "white" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "rate(zaino_sync_finalized_height{namespace=\"$namespace\"}[5m]) * 60",
              "legendFormat": "5m rate"
            },
            {
              "expr": "avg_over_time(rate(zaino_sync_finalized_height{namespace=\"$namespace\"}[5m])[${__range}:1m]) * 60",
              "legendFormat": "Average"
            }
          ]
        },
        {
          "id": 4,
          "title": "Finalized Height",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "locale", "decimals": 0, "color": { "mode": "fixed", "fixedColor": "semi-dark-green" } }
          },
          "options": { "graphMode": "none", "textMode": "value" },
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Finalized Height"
            }
          ]
        },
        {
          "id": 5,
          "title": "Target Height",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "locale", "decimals": 0, "color": { "mode": "fixed", "fixedColor": "semi-dark-blue" } }
          },
          "options": { "graphMode": "none", "textMode": "value" },
          "targets": [
            {
              "expr": "zaino_sync_target_height{namespace=\"$namespace\"}",
              "legendFormat": "Target Height"
            }
          ]
        },
        {
          "id": 6,
          "title": "Chain Tip",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "locale", "decimals": 0, "color": { "mode": "fixed", "fixedColor": "semi-dark-orange" } }
          },
          "options": { "graphMode": "none", "textMode": "value" },
          "targets": [
            {
              "expr": "zaino_chain_tip_height{namespace=\"$namespace\"}",
              "legendFormat": "Chain Tip"
            }
          ]
        },
        {
          "id": 10,
          "title": "Sync Throughput",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "collapsed": false
        },
        {
          "id": 11,
          "title": "Transactions / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 1,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "spanNulls": true
              },
              "color": { "mode": "fixed", "fixedColor": "semi-dark-yellow" }
            }
          },
          "targets": [
            {
              "expr": "rate(zaino_sync_transactions_total{namespace=\"$namespace\"}[5m])",
              "legendFormat": "tx/s"
            }
          ]
        },
        {
          "id": 12,
          "title": "Shielded Actions / sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 1,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "spanNulls": true
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sapling outputs/s" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-purple" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Orchard actions/s" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-blue" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "rate(zaino_sync_sapling_outputs_total{namespace=\"$namespace\"}[5m])",
              "legendFormat": "Sapling outputs/s"
            },
            {
              "expr": "rate(zaino_sync_orchard_actions_total{namespace=\"$namespace\"}[5m])",
              "legendFormat": "Orchard actions/s"
            }
          ]
        },
        {
          "id": 13,
          "title": "Combined Shielded Throughput",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 1,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20,
                "spanNulls": true,
                "gradientMode": "scheme"
              },
              "color": { "mode": "fixed", "fixedColor": "semi-dark-green" }
            }
          },
          "targets": [
            {
              "expr": "rate(zaino_sync_sapling_outputs_total{namespace=\"$namespace\"}[5m]) + rate(zaino_sync_orchard_actions_total{namespace=\"$namespace\"}[5m])",
              "legendFormat": "Shielded actions/s"
            }
          ]
        },
        {
          "id": 30,
          "title": "Zebra RPC (outbound)",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "collapsed": false
        },
        {
          "id": 31,
          "title": "RPC Calls / sec by method",
          "description": "Outbound RPC calls zaino makes to zebra, per method (zaino_rpc_outbound_requests_total)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "spanNulls": true,
                "stacking": { "mode": "normal" }
              }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"] } },
          "targets": [
            {
              "expr": "rate(zaino_rpc_outbound_requests_total{namespace=\"$namespace\"}[5m])",
              "legendFormat": "{{method}}"
            }
          ]
        },
        {
          "id": 32,
          "title": "RPC Latency p99 by method",
          "description": "p99 latency of outbound RPC calls to zebra, per method (zaino_rpc_outbound_request_duration_seconds)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 4,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 0,
                "spanNulls": true
              }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "max"] } },
          "targets": [
            {
              "expr": "zaino_rpc_outbound_request_duration_seconds{namespace=\"$namespace\", quantile=\"0.99\"}",
              "legendFormat": "{{method}}"
            }
          ]
        },
        {
          "id": 40,
          "title": "Mempool & Block I/O",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "collapsed": false
        },
        {
          "id": 41,
          "title": "Mempool",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 33 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "spanNulls": true
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Tip changes/min" },
                "properties": [
                  { "id": "custom.axisPlacement", "value": "right" },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-orange" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Mempool txs" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-purple" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "zaino_mempool_transactions{namespace=\"$namespace\"}",
              "legendFormat": "Mempool txs"
            },
            {
              "expr": "rate(zaino_mempool_tip_changes_total{namespace=\"$namespace\"}[5m]) * 60",
              "legendFormat": "Tip changes/min"
            }
          ]
        },
        {
          "id": 42,
          "title": "Block Build Latency",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 33 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 4,
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "spanNulls": true }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "p50" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-green" } } ] },
              { "matcher": { "id": "byName", "options": "p99" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-red" } } ] }
            ]
          },
          "targets": [
            { "expr": "zaino_sync_block_build_seconds{namespace=\"$namespace\", quantile=\"0.5\"}", "legendFormat": "p50" },
            { "expr": "zaino_sync_block_build_seconds{namespace=\"$namespace\", quantile=\"0.99\"}", "legendFormat": "p99" }
          ]
        },
        {
          "id": 43,
          "title": "Block Write Latency",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 33 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 4,
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "spanNulls": true }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "p50" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-green" } } ] },
              { "matcher": { "id": "byName", "options": "p99" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-red" } } ] }
            ]
          },
          "targets": [
            { "expr": "zaino_sync_block_write_seconds{namespace=\"$namespace\", quantile=\"0.5\"}", "legendFormat": "p50" },
            { "expr": "zaino_sync_block_write_seconds{namespace=\"$namespace\", quantile=\"0.99\"}", "legendFormat": "p99" }
          ]
        },
        {
          "id": 20,
          "title": "Logs",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 40 },
          "collapsed": false
        },
        {
          "id": 21,
          "title": "Zaino logs",
          "type": "logs",
          "gridPos": { "h": 14, "w": 12, "x": 0, "y": 41 },
          "datasource": { "type": "loki", "uid": "loki" },
          "links": [
            {
              "title": "Open in full logs view",
              "url": "/d/zcash-logs/zcash-stack-logs?var-namespace=${namespace}&var-service=zaino&var-search=${logsearch}&${__url_time_range}",
              "targetBlank": true
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=\"$namespace\", app=\"zaino\"} |= \"$logsearch\"",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 22,
          "title": "Zebra logs",
          "type": "logs",
          "gridPos": { "h": 14, "w": 12, "x": 12, "y": 41 },
          "datasource": { "type": "loki", "uid": "loki" },
          "links": [
            {
              "title": "Open in full logs view",
              "url": "/d/zcash-logs/zcash-stack-logs?var-namespace=${namespace}&var-service=zebra&var-search=${logsearch}&${__url_time_range}",
              "targetBlank": true
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=\"$namespace\", app=\"zebra\"} |= \"$logsearch\"",
              "queryType": "range"
            }
          ]
        }
      ],
      "time": { "from": "now-1h", "to": "now" }
    }
