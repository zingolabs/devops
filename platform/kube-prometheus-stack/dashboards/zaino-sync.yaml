apiVersion: v1
kind: ConfigMap
metadata:
  name: zaino-sync-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  zaino-sync.json: |
    {
      "uid": "zaino-sync",
      "title": "Zaino Sync",
      "tags": ["zaino", "zcash"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(zaino_chain_tip_height, namespace)",
            "refresh": 2,
            "includeAll": false,
            "current": {},
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Sync Progress",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 16, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": true
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Chain Tip" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-orange" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Finalized Height" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "semi-dark-green" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Finalized Height"
            },
            {
              "expr": "zaino_chain_tip_height{namespace=\"$namespace\"}",
              "legendFormat": "Chain Tip"
            },
            {
              "expr": "zaino_sync_target_height{namespace=\"$namespace\"}",
              "legendFormat": "Target Height"
            }
          ]
        },
        {
          "id": 2,
          "title": "Sync Gap",
          "description": "Blocks remaining: chain tip minus finalized height",
          "type": "stat",
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 1000 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "zaino_chain_tip_height{namespace=\"$namespace\"} - zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Blocks behind"
            }
          ]
        },
        {
          "id": 3,
          "title": "Sync Rate",
          "description": "Blocks synced per minute (5m avg)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "green", "value": 100 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "rate(zaino_sync_finalized_height{namespace=\"$namespace\"}[5m]) * 60",
              "legendFormat": "blocks/min"
            }
          ]
        },
        {
          "id": 4,
          "title": "Current Heights",
          "type": "table",
          "gridPos": { "h": 5, "w": 24, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "none", "decimals": 0 }
          },
          "transformations": [
            { "id": "merge", "options": {} }
          ],
          "targets": [
            {
              "expr": "zaino_sync_finalized_height{namespace=\"$namespace\"}",
              "legendFormat": "Finalized",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "zaino_sync_target_height{namespace=\"$namespace\"}",
              "legendFormat": "Target",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "zaino_chain_tip_height{namespace=\"$namespace\"}",
              "legendFormat": "Chain Tip",
              "instant": true,
              "format": "table"
            }
          ]
        }
      ],
      "time": { "from": "now-1h", "to": "now" }
    }
