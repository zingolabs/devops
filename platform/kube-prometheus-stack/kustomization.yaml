apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - dashboards/zaino-sync.yaml
  - dashboards/zcash-stack.yaml
  - dashboards/sync-profile.yaml
  - dashboards/zcash-logs.yaml
  - alerts/zaino-alerts.yaml
  - alerts/node-alerts.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 82.13.6
    releaseName: kube-prometheus-stack
    namespace: monitoring
    includeCRDs: true
    valuesFile: defaults.yaml
    additionalValuesFiles:
      - values.yaml
