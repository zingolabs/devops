apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: node.memory
      rules:
        - alert: NodeMemoryHigh
          expr: |
            (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.85
          for: 5m
          labels:
            severity: warning
            alert_channel: infra
          annotations:
            summary: "High memory usage on {{ $labels.instance }}"
            description: "Memory usage is {{ $value | humanizePercentage }} on node {{ $labels.instance }}"

        - alert: NodeMemoryCritical
          expr: |
            (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.95
          for: 2m
          labels:
            severity: critical
            alert_channel: infra
          annotations:
            summary: "Critical memory usage on {{ $labels.instance }}"
            description: "Memory usage is {{ $value | humanizePercentage }} on node {{ $labels.instance }}"

        - alert: NodeSwapActive
          expr: |
            node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes < 0.5
            and node_memory_SwapTotal_bytes > 0
          for: 10m
          labels:
            severity: warning
            alert_channel: infra
          annotations:
            summary: "Heavy swap usage on {{ $labels.instance }}"
            description: "Swap is {{ $value | humanizePercentage }} free on node {{ $labels.instance }}"
