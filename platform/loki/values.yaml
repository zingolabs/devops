# Loki 3.x single-binary configuration
# Chart: grafana/loki v6.55.0
# Replaces deprecated loki-stack chart (Loki 2.6.1)

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2025-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  pattern_ingester:
    enabled: true
  limits_config:
    retention_period: 336h  # 14 days
    volume_enabled: true
    allow_structured_metadata: true
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    size: 50Gi
  affinity: {}

# Disable distributed components (single-node cluster)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# No gateway needed for single-node
gateway:
  enabled: false

# No caches needed for single-binary filesystem
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# No minio (local filesystem)
minio:
  enabled: false

# No test/canary
test:
  enabled: false
lokiCanary:
  enabled: false
