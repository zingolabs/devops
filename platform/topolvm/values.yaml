# TopoLVM configuration
# Points to the LVM thin pool we created

lvmd:
  managed: true
  deviceClasses:
    - name: thin
      volume-group: data_vg
      type: thin
      thin-pool:
        name: thinpool
        overprovision-ratio: 5.0
      default: true

storageClasses:
  - name: topolvm-thin
    storageClass:
      isDefaultClass: true
      volumeBindingMode: WaitForFirstConsumer
      allowVolumeExpansion: true
      additionalParameters:
        topolvm.io/device-class: thin

# Note: VolumeSnapshotClass is created via snapshot-controller kustomization
# (snapshotClasses is not a valid TopoLVM chart option)
