# loki-stack configuration

# Loki log aggregator
loki:
  enabled: true
  persistence:
    enabled: true
    storageClassName: topolvm-thin
    size: 50Gi
  config:
    chunk_store_config:
      max_look_back_period: 336h  # 14 days
    table_manager:
      retention_deletes_enabled: true
      retention_period: 336h  # 14 days

# Promtail log collector (runs on each node)
promtail:
  enabled: true

# Disable Grafana - using kube-prometheus-stack's Grafana
grafana:
  enabled: false
  # Loki datasource will be added to kube-prometheus-stack's Grafana
  # via additionalDataSources in its values if needed

# Disable other optional components
fluent-bit:
  enabled: false

filebeat:
  enabled: false

logstash:
  enabled: false
