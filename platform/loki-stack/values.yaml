# loki-stack configuration

# Loki log aggregator
loki:
  enabled: true
  persistence:
    enabled: true
    storageClassName: local-path
    size: 50Gi
  # NOTE: volume_enabled requires Loki 3.x+ (current: 2.6.1 via loki-stack 2.10.3)
  # TODO: upgrade to standalone loki chart v6.x for Logs Drilldown support
  config:
    chunk_store_config:
      max_look_back_period: 336h  # 14 days
    table_manager:
      retention_deletes_enabled: true
      retention_period: 336h  # 14 days

# Promtail log collector (runs on each node)
promtail:
  enabled: true

# Disable Grafana - using kube-prometheus-stack's Grafana
grafana:
  enabled: false
  # Datasource is managed via kube-prometheus-stack values.yaml
  sidecar:
    datasources:
      enabled: false

# Disable other optional components
fluent-bit:
  enabled: false

filebeat:
  enabled: false

logstash:
  enabled: false
