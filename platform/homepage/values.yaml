image:
  repository: ghcr.io/gethomepage/homepage
  tag: v1.11.0

enableRbac: true
serviceAccount:
  create: true

env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: "zingo-infra.vaquita-altair.ts.net"

config:
  settings:
    title: Zingo Infrastructure
    favicon: https://raw.githubusercontent.com/nicogaldamez/zcash-brand/main/zcash-icons/yellow/zcash-icon-yellow.png
    headerStyle: boxed
    layout:
      Golden (Mainnet):
        style: row
        columns: 3
      Golden (Testnet):
        style: row
        columns: 3
      Tryouts:
        style: row
        columns: 3
      Platform:
        style: row
        columns: 3

  services:
    # --- Domain services ---
    - Golden (Mainnet):
        - Zebra (mainnet):
            icon: mdi-cube-outline
            href: "#"
            description: Zcash full node validator
            namespace: golden-mainnet
            podSelector: "app=zebra"
        - golden-mainnet-zaino.vaquita-altair.ts.net:
            icon: mdi-server-network
            href: https://golden-mainnet-zaino.vaquita-altair.ts.net
            description: gRPC lightwalletd indexer (mainnet)
            namespace: golden-mainnet
            podSelector: "app=zaino"

    - Golden (Testnet):
        - Zebra (testnet):
            icon: mdi-cube-outline
            href: "#"
            description: Zcash full node validator
            namespace: golden-testnet
            podSelector: "app=zebra"
        - golden-testnet-zaino.vaquita-altair.ts.net:
            icon: mdi-server-network
            href: https://golden-testnet-zaino.vaquita-altair.ts.net
            description: gRPC lightwalletd indexer (testnet)
            namespace: golden-testnet
            podSelector: "app=zaino"

    - Tryouts:
        - tryout-1-zaino.vaquita-altair.ts.net:
            icon: mdi-test-tube
            href: https://tryout-1-zaino.vaquita-altair.ts.net
            description: Ephemeral zaino instance (no TLS)
            namespace: tryout-1
            podSelector: "app=zaino"
        - tryout-2-zaino.vaquita-altair.ts.net:
            icon: mdi-test-tube
            href: https://tryout-2-zaino.vaquita-altair.ts.net
            description: Ephemeral zaino instance (TLS)
            namespace: tryout-2
            podSelector: "app=zaino"
        - tryout-3-zaino.vaquita-altair.ts.net:
            icon: mdi-test-tube
            href: https://tryout-3-zaino.vaquita-altair.ts.net
            description: Ephemeral zaino instance (TLS, Funnel enabled)
            namespace: tryout-3
            podSelector: "app=zaino"

    # --- Platform services ---
    - Platform:
        - monitoring-kube-prometheus-stack-grafana.vaquita-altair.ts.net:
            icon: grafana
            href: https://monitoring-kube-prometheus-stack-grafana.vaquita-altair.ts.net
            description: Metrics & dashboards
            namespace: monitoring
            podSelector: "app.kubernetes.io/name=grafana"
        - argocd-argocd-server.vaquita-altair.ts.net:
            icon: argocd
            href: https://argocd-argocd-server.vaquita-altair.ts.net
            description: GitOps continuous delivery
            namespace: argocd
            podSelector: "app.kubernetes.io/name=argocd-server"

  widgets:
    - search:
        provider: duckduckgo
        target: _blank

  kubernetes:
    mode: cluster

  bookmarks: []
  docker: {}
