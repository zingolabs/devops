# Platform components for local development

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.17.2
    helm:
      releaseName: cert-manager
      values: |
        crds:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapshot-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zingolabs/devops
    path: platform/snapshot-controller
    targetRevision: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: topolvm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://topolvm.github.io/topolvm
    chart: topolvm
    targetRevision: 15.5.0
    helm:
      releaseName: topolvm
      valueFiles: []
      values: |
        controller:
          replicaCount: 1
        lvmd:
          managed: true
          deviceClasses:
            - name: thin
              volume-group: data_vg
              type: thin
              thin-pool:
                name: thinpool
                overprovision-ratio: 5.0
              default: true
        storageClasses:
          - name: topolvm-thin
            storageClass:
              isDefaultClass: true
              volumeBindingMode: WaitForFirstConsumer
              allowVolumeExpansion: true
              additionalParameters:
                topolvm.io/device-class: thin
  destination:
    server: https://kubernetes.default.svc
    namespace: topolvm-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kanister
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zingolabs/devops
    path: platform/kanister
    targetRevision: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: kanister
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
