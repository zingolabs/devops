ingress:
  enabled: false

zebra:
  enabled: true
  name: zebra-testnet
  testnet: true
  replicas: 0
  storageClassName: topolvm-thin
  volumes:
    data:
      size: 20Gi
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 4Gi

zaino:
  enabled: true
  name: zaino-testnet
  replicas: 0
  rpcService: zebra-testnet
  storageClassName: topolvm-thin
  image:
    repository: zingodevops/zaino
    tag: 0.2.0-rc.4-no-tls
    hash: ""
    pullPolicy: IfNotPresent
  volumes:
    data:
      size: 150Gi
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 8Gi

lightwalletd:
  enabled: false

zcashd:
  enabled: false
