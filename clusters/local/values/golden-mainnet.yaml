ingress:
  enabled: false

zebra:
  enabled: true
  name: zebra
  testnet: false
  replicas: 0
  storageClassName: topolvm-thin
  volumes:
    data:
      size: 400Gi
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 8Gi

zaino:
  enabled: true
  name: zaino
  replicas: 0
  rpcService: zebra
  storageClassName: topolvm-thin
  image:
    repository: zingodevops/zaino
    tag: 0.2.0-rc.6
    hash: ""
    pullPolicy: IfNotPresent
  volumes:
    data:
      size: 500Gi
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 16Gi

lightwalletd:
  enabled: false

zcashd:
  enabled: false
