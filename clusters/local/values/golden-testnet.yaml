ingress:
  enabled: false

zebra:
  enabled: true
  name: zebra
  testnet: true
  replicas: 1
  storageClassName: topolvm-thin
  volumes:
    data:
      size: 20Gi
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 4Gi

zaino:
  enabled: true
  name: zaino
  replicas: 1
  rpcService: zebra
  storageClassName: topolvm-thin
  image:
    repository: zingodevops/zaino
    tag: 0.2.0-rc.6
    hash: ""
    pullPolicy: IfNotPresent
  volumes:
    data:
      size: 150Gi
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 8Gi

lightwalletd:
  enabled: false

zcashd:
  enabled: false
