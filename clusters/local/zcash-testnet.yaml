# Zcash testnet - Zebra + Zaino
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zcash-testnet
  namespace: argocd
spec:
  project: default
  # Let Kanister control replicas during snapshot operations
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    jsonPointers:
    - /spec/replicas
  sources:
    # Helm chart from zingolabs fork
    - repoURL: https://github.com/zingolabs/zcash-stack
      path: charts/zcash-stack
      targetRevision: main
      helm:
        releaseName: zcash-testnet
        valueFiles:
          - $values/clusters/local/values/zcash-testnet.yaml
    # Values from our repo
    - repoURL: https://github.com/zingolabs/devops
      targetRevision: dev
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: zcash
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
