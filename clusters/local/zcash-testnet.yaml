# Zcash testnet - Zebra + Zaino
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zcash-testnet
  namespace: argocd
spec:
  project: default
  sources:
    # Helm chart (ECC repo moved to zodl-inc)
    - repoURL: https://github.com/zodl-inc/zcash-stack
      path: .
      targetRevision: main
      helm:
        releaseName: zcash-testnet
        valueFiles:
          - $values/clusters/local/values/zcash-testnet.yaml
    # Values from our repo
    - repoURL: https://github.com/zingolabs/devops
      targetRevision: dev
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: zcash
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
