ingress:
  enabled: false

zebra:
  enabled: true
  name: zebra
  testnet: false
  replicas: 1
  image:
    tag: "5.1.0"
    hash: ""
  storageClassName: topolvm-thin
  volumes:
    data:
      size: 350Gi
  requests:
    cpu: 2
    memory: 4Gi
  limits:
    memory: 24Gi

zaino:
  enabled: true
  name: zaino
  replicas: 1
  rpcService: zebra
  service:
    type: ClusterIP
    port: 8137
    annotations:
      tailscale.com/expose: "true"
  storageClassName: topolvm-thin
  image:
    repository: zingodevops/zaino
    tag: 0.4.1-no-tls
    hash: ""
    pullPolicy: IfNotPresent
  config:
    dbSize: 160
  logging:
    format: json
    color: "false"
    level: "zaino=trace"
  volumes:
    data:
      size: 200Gi
  requests:
    cpu: 2
    memory: 4Gi
  limits:
    memory: 32Gi

lightwalletd:
  enabled: false

zcashd:
  enabled: false
