ingress:
  enabled: false

zebra:
  enabled: true
  name: zebra
  testnet: true
  replicas: 1
  storageClassName: topolvm-thin
  volumes:
    data:
      size: 50Gi
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 8Gi

zaino:
  enabled: true
  name: zaino
  replicas: 1
  rpcService: zebra
  service:
    type: ClusterIP
    port: 8137
    annotations:
      tailscale.com/expose: "true"
  storageClassName: topolvm-thin
  image:
    repository: zingodevops/zaino
    tag: 0.2.0-rc.6-no-tls
    hash: ""
    pullPolicy: IfNotPresent
  volumes:
    data:
      size: 200Gi
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 16Gi

lightwalletd:
  enabled: false

zcashd:
  enabled: false
