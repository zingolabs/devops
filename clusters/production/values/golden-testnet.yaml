ingress:
  enabled: false

zebra:
  enabled: true
  name: zebra
  testnet: true
  replicas: 1
  image:
    tag: "5.1.0"
  storageClassName: topolvm-thin
  volumes:
    data:
      size: 50Gi
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 8Gi

zaino:
  enabled: true
  name: zaino
  replicas: 1
  rpcService: zebra
  service:
    type: ClusterIP
    port: 8137
    annotations:
      tailscale.com/expose: "true"
  storageClassName: topolvm-thin
  image:
    repository: zingodevops/zaino
    tag: 0.4.1-no-tls-with-prometheus
    hash: ""
    pullPolicy: IfNotPresent
  logging:
    format: json
    color: "false"
    level: "zaino=trace"
  extraEnv:
    ZAINO_METRICS_ENDPOINT: "0.0.0.0:9998"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.monitoring.svc:4317"
  volumes:
    data:
      size: 100Gi
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 16Gi

lightwalletd:
  enabled: false

zcashd:
  enabled: false
