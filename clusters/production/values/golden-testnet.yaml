ingress:
  enabled: false

zebra:
  enabled: false
  name: zebra
  testnet: true
  replicas: 1
  storageClassName: topolvm-thin
  volumes:
    data:
      size: 50Gi
      dataSource:
        kind: VolumeSnapshot
        apiGroup: snapshot.storage.k8s.io
        name: zebra-data-zebra-0-snapshot-jjvtt
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 8Gi

zaino:
  enabled: false
  name: zaino
  replicas: 1
  rpcService: zebra
  service:
    type: ClusterIP
    port: 8137
    annotations:
      tailscale.com/expose: "true"
  storageClassName: topolvm-thin
  image:
    repository: zingodevops/zaino
    tag: 0.2.0-rc.6-no-tls
    hash: ""
    pullPolicy: IfNotPresent
  volumes:
    data:
      size: 100Gi
      dataSource:
        kind: VolumeSnapshot
        apiGroup: snapshot.storage.k8s.io
        name: data-zaino-0-snapshot-24ldq
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    memory: 16Gi

lightwalletd:
  enabled: false

zcashd:
  enabled: false
