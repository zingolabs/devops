# Unified ApplicationSet for production cluster
# Reads from both platform/defs/*.yaml and domain/defs/*.yaml

---
# Platform apps (kustomize/path-based)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: https://github.com/zingolabs/devops
        revision: main
        files:
          - path: "platform/defs/*.yaml"
  template:
    metadata:
      name: '{{.name}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/zingolabs/devops
        path: '{{.sourcePath}}'
        targetRevision: main
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true

---
# Domain apps (helm-git/multi-source)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: domain
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: https://github.com/zingolabs/devops
        revision: main
        files:
          - path: "domain/defs/*.yaml"
  template:
    metadata:
      name: '{{.name}}'
      namespace: argocd
    spec:
      project: default
      sources:
        - repoURL: '{{.chartRepo}}'
          path: '{{.chartPath}}'
          targetRevision: '{{.chartRevision}}'
          helm:
            releaseName: '{{.name}}'
            valueFiles:
              - $values/clusters/production/values/{{.name}}.yaml
        - repoURL: https://github.com/zingolabs/devops
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
